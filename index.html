<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chips MilkTea CMS</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/chips-logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#F58220" />
    
    <!-- Driver.js for Tours -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.css"/>
    <script src="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.js.iife.js"></script>
    
    <!-- Tippy.js & Popper (Floating UI) for Tooltips/Popovers -->
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/dist/tippy.css" />
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/shift-away.css" />
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>

    <style>
      html, body { height: 100%; margin: 0; } 
      #root { height: 100%; }

      /* ─── CUSTOM DRIVER.JS PREMIUM UI ─── */
      .driver-popover {
        background-color: #ffffff !important;
        border-radius: 24px !important;
        padding: 24px !important;
        border: 1px solid rgba(245, 130, 32, 0.1) !important;
        box-shadow: 0 25px 50px -12px rgba(93, 46, 15, 0.25) !important;
        max-width: 350px !important;
        font-family: 'DM Sans', sans-serif !important;
      }
      .driver-popover-title {
        font-family: 'Playfair Display', serif !important;
        font-size: 18pt !important;
        font-weight: 800 !important;
        color: #2D1606 !important;
        margin-bottom: 12px !important;
      }
      .driver-popover-description {
        font-size: 10pt !important;
        color: #8A552A !important;
        line-height: 1.6 !important;
        font-weight: 500 !important;
      }
      .driver-popover-btn {
        background: #2D1606 !important;
        color: white !important;
        border-radius: 14px !important;
        padding: 10px 20px !important;
        font-size: 9pt !important;
        font-weight: 800 !important;
        transition: all 0.3s ease !important;
      }
      .driver-popover-btn:hover {
        background: #F58220 !important;
        transform: translateY(-2px) !important;
      }

      /* ─── PREMIUM TIPPY.JS THEME (CHIPS) ─── */
      .tippy-box[data-theme~='chips-premium'] {
        background-color: #2D1606;
        color: #FFFFFF;
        border-radius: 12px;
        font-family: 'DM Sans', sans-serif;
        font-size: 9pt;
        font-weight: 600;
        box-shadow: 0 10px 25px rgba(45, 22, 6, 0.2);
        padding: 4px 8px;
      }
      .tippy-box[data-theme~='chips-premium'] .tippy-content {
        padding: 8px 12px;
      }
      .tippy-box[data-theme~='chips-premium'] .tippy-arrow {
        color: #2D1606;
      }

      .tippy-box[data-theme~='chips-light'] {
        background-color: #FFFFFF;
        color: #2D1606;
        border-radius: 16px;
        font-family: 'DM Sans', sans-serif;
        font-size: 9.5pt;
        border: 1.5px solid #F0DCC8;
        box-shadow: 0 15px 35px rgba(93, 46, 15, 0.1);
      }
      .tippy-box[data-theme~='chips-light'] .tippy-content {
        padding: 12px 16px;
      }
      .tippy-box[data-theme~='chips-light'] .tippy-arrow {
        color: #FFFFFF;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
